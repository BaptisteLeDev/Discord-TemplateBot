# Strategie CI a DEUX ETAGES (pour ne pas exploser le billing GitHub Actions).
#
#   Etage 1 - ONLINE (ce fichier) : uniquement les verifications RAPIDES et peu couteuses
#     (install + typecheck + lint + bun test). Se declenche sur push main + pull_request.
#     La `concurrency` annule les runs redondants d'une meme ref => on ne paie pas deux fois
#     pour des commits qui se succedent vite sur une PR.
#
#   Etage 2 - LOCAL (.github/workflows/deep.yml) : les jobs LOURDS (build image Docker,
#     smoke test /health, SonarQube, CodeQL). `workflow_dispatch` UNIQUEMENT => ne se
#     declenche JAMAIS tout seul en ligne (zero minute facturee). On les execute en LOCAL
#     via `act` + Podman. Mode d'emploi : docs/local-ci.md.
#
#   Securite : audit de vulnerabilites des dependances = cron hebdomadaire separe et leger
#     dans .github/workflows/security-audit.yml.
#
# Le job `deploy` (CD gated vers Dokploy via le tailnet ; VPS dark, cf. ADR-0005) reste
# fourni en commentaire-modele : le gabarit n'a pas d'app Dokploy a cibler. Le decommenter
# et renseigner les secrets dans un vrai bot derive.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule le run en cours si un nouveau commit arrive sur la meme ref (economie de minutes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test

