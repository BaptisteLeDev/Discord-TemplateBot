# SonarQube - configuration du gabarit Discord TemplateBot.
# Consomme par sonar-scanner (etage 2 local, cf. .github/workflows/deep.yml + docs/local-ci.md).
sonar.projectKey=botfactory-discord-template-bot
sonar.projectName=Discord TemplateBot
sonar.projectVersion=1.0.0

# Code analyse : tout src/. Encodage explicite (fichiers FR accentues).
sonar.sources=src
sonar.tests=src
sonar.sourceEncoding=UTF-8

# Fichiers de TEST (colocalises) et harnais de contrat => classes comme tests, pas du prod.
sonar.test.inclusions=**/*.test.ts,**/*.contract.ts

# Exclus de l'analyse du code de PROD : tests colocalises, harnais de contrat, helper de test.
# (sonar.exclusions ne s'applique qu'aux sources principales ; les fichiers de test restent
#  indexes cote tests via sonar.test.inclusions, sans double indexation.)
sonar.exclusions=**/*.test.ts,**/*.contract.ts,src/db/test-db.ts

# Couverture LCOV si generee (bun test --coverage --coverage-reporter=lcov => coverage/lcov.info).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Pas d'etape de build : Bun execute le TS directement. tsconfig a la racine.
sonar.typescript.tsconfigPath=tsconfig.json
